const db = firebase.database();
window.storage = {
  get: async (key, shared) => {
    if (!shared) {
      const val = localStorage.getItem('cb_' + key);
      return val ? { value: val } : null;
    }
    return new Promise((res) => {
      db.ref('shared/' + key).once('value', snap => {
        const val = snap.val();
        res(val !== null ? { value: JSON.stringify(val) } : null);
      }, () => res(null));
    });
  },
  set: async (key, value, shared) => {
    if (!shared) {
      localStorage.setItem('cb_' + key, value);
      return { value };
    }
    const parsed = typeof value === 'string' ? JSON.parse(value) : value;
    await db.ref('shared/' + key).set(parsed);
    return { value };
  },
  delete: async (key, shared) => {
    if (!shared) { localStorage.removeItem('cb_' + key); return { deleted: true }; }
    await db.ref('shared/' + key).remove();
    return { deleted: true };
  }
};

const PINCH_LIMIT = 3; // max pinch-hitter uses per person per week

// ── Completion scoring (drives pick order) ───────────────────────────────────
function completionScore(pid, state) {
  const tasks = PERSONAL_TASKS[pid] || [];
  let total = 0, done = 0;
  DAYS.forEach(day => {
    tasks.filter(t => isTaskActive(t, day, state, pid)).forEach(t => {
      total++;
      if (state.personalDone?.[`${pid}-${t.id}-${day}`]) done++;
    });
  });
  CHORES.forEach(c => choreDays(c).forEach(day => {
    if ((state.choreAssignments?.[c.id] || {})[day] === pid) {
      total++;
      if (state.completions?.[`${c.id}-${day}-${pid}`]) done++;
    }
    // everyone/group chores live in groupHelpers
    if ((c.type === 'everyone' || c.type === 'group') && state.groupHelpers?.[c.id]?.[day]?.[pid]) {
      total++;
      if (state.completions?.[`${c.id}-${day}-${pid}`]) done++;
    }
  }));
  return { total, done, pct: total ? Math.round(done / total * 100) : 0 };
}

// Rank people best → worst. The lowest scorer picks LAST.
function pickOrder(state) {
  return [...(state.people || [])]
    .map(p => ({ ...p, ...completionScore(p.id, state) }))
    .sort((a, b) => b.pct - a.pct || b.done - a.done);
}

// Pick order = LAST SAY, not a lock. Anyone can pick any time.
// Whoever completed the MOST chores ranks highest and may override someone below them.
function pickStatus(meId, state) {
  const order = pickOrder(state);
  const myIdx = Math.max(0, order.findIndex(p => p.id === meId));
  const myRank = myIdx;
  // I can override anyone ranked BELOW me (i.e. who did fewer chores)
  const canOverride = (otherId) => {
    const oIdx = order.findIndex(p => p.id === otherId);
    return oIdx > myRank;
  };
  return { order, myRank, canOverride, topName: order[0]?.name };
}

// Auto-assign a random open project to whoever never volunteered

  return open[Math.floor(Math.random() * open.length)];
}

function checkSignoff(meId, plan, projects) {
  const ca = plan.choreAssignments || {};
  const pca = plan.personalChoreAssignments || {};
  const gh  = plan.groupHelpers || {};
  const myCount = (id) => Object.entries(ca[id]||{}).filter(([,pid])=>pid===meId).length;
  const hasDinner = DINNER_IDS.some(id => myCount(id) > 0);
  const hasSweep  = DAYS.some(d => gh['sweepmop']?.[d]?.[meId]);
  // "other" = any shared non-dinner/sweep chore, or a personal chore assigned, or helping a group chore, or project
  const hasSharedOther = CHORES.filter(c=>!SKIP_IDS.includes(c.id)&&c.type==='shared').some(c=>myCount(c.id)>0);
  const hasPersonalChore = PERSONAL_CHORE_IDS.some(id => pca[meId]?.[id]);
  const isHelpingGroup = GROUP_CHORE_IDS.some(id => DAYS.some(d => (gh[id]?.[d]?.[meId])));
  const hasCoffee = myCount('coffeetable_pre') > 0;
  const helpingProject = (projects||[]).some(p=>p.status==='open'&&(p.helpers||[]).includes(meId));
  const hasOther = hasSharedOther || hasPersonalChore || isHelpingGroup || helpingProject || hasCoffee;
  const missing = [];
  if (!hasDinner) missing.push('Pick at least one: Cook dinner, After dinner dishes, or Kitchen clean');
  if (!hasSweep)  missing.push('Pick at least 1 Sweep & Mop day \u2014 everyone does this one');
  if (!hasOther)  missing.push('Pick a Weekly chore, personal chore, help on a group chore, or offer to help on a Project');
  return { valid: missing.length === 0, missing };
}

function freshPlan() { return { weekOf:'', choreAssignments:{}, personalChoreAssignments:{}, groupHelpers:{}, signOffs:{}, notes:'', tradeRequests:[] }; }
function fresh() {
  return {
    weekOf:'', people:DEFAULT_PEOPLE, notes:'',
    choreAssignments:{}, completions:{}, personalDone:{},
    groupHelpers:{}, personalChoreAssignments:{},
    notifications:[], pinchRequests:[], pinchCounts:{}, laundrySchedule:{...DEFAULT_LAUNDRY},
    weekPlans:[freshPlan(),freshPlan(),freshPlan(),freshPlan()],
    projects:[{
      id:'default-organize', title:'Organize cabinets & closets',
      summary:'Sort everything, clear the floor, make sure all doors close fully.',
      startDate:'', endDate:'', submittedBy:'michael',
      submittedAt:new Date().toISOString(), helpers:[], status:'open', recurring:true,
    }],
    history:[],
  };
}
function migrate(raw) {
  const f = fresh();
  const out = { ...f, ...raw,
    choreAssignments:raw.choreAssignments||{}, completions:raw.completions||{},
    personalDone:raw.personalDone||{}, history:raw.history||[], people:raw.people?.length?raw.people:DEFAULT_PEOPLE,
    groupHelpers:raw.groupHelpers||{}, personalChoreAssignments:raw.personalChoreAssignments||{},
    notifications:raw.notifications||[], pinchRequests:raw.pinchRequests||[], pinchCounts:raw.pinchCounts||{},
    laundrySchedule:{...DEFAULT_LAUNDRY,...(raw.laundrySchedule||{})},
  };
  const existing = raw.projects||[];
  out.projects = existing.find(p=>p.id==='default-organize') ? existing : [f.projects[0],...existing];
  const migratePlan = (p) => ({...freshPlan(),...p, personalChoreAssignments:p?.personalChoreAssignments||{}, groupHelpers:p?.groupHelpers||{}});
  out.weekPlans = (raw.weekPlans&&Array.isArray(raw.weekPlans)&&raw.weekPlans.length===4)
    ? raw.weekPlans.map(migratePlan)
    : raw.nextWeek ? [migratePlan(raw.nextWeek),freshPlan(),freshPlan(),freshPlan()]
    : [freshPlan(),freshPlan(),freshPlan(),freshPlan()];
  return out;
}

            style={{flex:1,background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.18)',borderRadius:8,color:'white',padding:'7px 10px',fontSize:13,outline:'none'}}/>

        <div style={{display:'flex',alignItems:'center',gap:5,fontSize:10.5,color:'#9FC9EA',marginTop:8}}>
          <span style={{width:6,height:6,borderRadius:'50%',background:saving?'#FBBF24':'#4ADE80',display:'inline-block'}}/>{saving?'Saving...':'Synced'}
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',background:N.navyL,position:'sticky',top:96,zIndex:29}}>
        {[
          {k:'today',   l:'This Week'},
          {k:'plan',    l:`Plan${pendTrades?` (${pendTrades})`:''}`},
          {k:'projects',l:`Projects${openProjects?` (${openProjects})`:''}`},
          {k:'history', l:'History'},
        ].map(t=>(
          <button key={t.k} onClick={()=>setTab(t.k)}
            style={{flex:1,textAlign:'center',padding:'10px 2px',fontSize:11.5,fontWeight:700,color:tab===t.k?'white':'rgba(255,255,255,0.55)',cursor:'pointer',background:'none',border:'none',borderBottom:`3px solid ${tab===t.k?'#7FC4F0':'transparent'}`}}>
            {t.l}
          </button>
        ))}
      </div>

      {tab==='today'    && <Today    state={state} me={me} day={day} setDay={setDay} upd={upd} toast$={toast$}/>}
      {tab==='plan'     && <Plan     state={state} me={me} planWeek={planWeek} setPlanWeek={setPlanWeek} upd={upd} toast$={toast$} signoffError={signoffError} setSignoffError={setSignoffError}/>}
      {tab==='projects' && <Projects state={state} me={me} upd={upd} toast$={toast$}/>}
      {tab==='history'  && <History  state={state} expanded={histExpanded} setExpanded={setHistExpanded}/>}

      {switchOpen && (
        <Modal onClose={()=>setSwitchOpen(false)}>
          <h2 style={{margin:'0 0 6px',fontSize:20,color:N.navy}}>Switch person</h2>
          <p style={{margin:'0 0 14px',fontSize:13.5,color:N.inkS}}>Who's using this phone?</p>
          {state.people.map(p=>(
            <div key={p.id} onClick={()=>{saveMe(p);setSwitchOpen(false);}}
              style={{display:'flex',alignItems:'center',gap:10,padding:'11px 14px',borderRadius:11,border:`1.5px solid ${N.line}`,cursor:'pointer',fontWeight:700,fontSize:14,marginBottom:8}}>
              <Dot color={p.color} sz={11}/>{p.name}
            </div>
          ))}
          <button onClick={()=>setSwitchOpen(false)} style={{width:'100%',padding:12,borderRadius:10,border:'none',background:'#EEF1F5',color:N.inkS,fontSize:14,fontWeight:700,cursor:'pointer',marginTop:6}}>Cancel</button>
        </Modal>
